collection:
  osm_tags:
    amenity: ["atm", "bank", "bar", "biergarten", "bicycle_parking", "bicycle_rental", "bus_station", "cafe", "car_sharing", "charging_station",
              "cinema", "dentist", "doctors", "fast_food", "fuel", "ice_cream", "kneipp_water_cure", "library",
              "marketplace", "nightclub", "pharmacy", "place_of_worship", "planetarium", "post_box", "post_office", "parking", "pub",
              "recycling", "restaurant", "taxi", "theatre", "vending_machine"]
    shop: ["bakery", "butcher", "chemist", "clothes", "convenience", "deli", "farm", "fashion", "florist", "fuel", "general",
           "greengrocer", "grocery", "hairdresser", "health_food", "honey", "kiosk", "mall", "shoes", "sports",
           "supermarket", "wine"]
    tourism: ["alpine_hut", "apartment", "aquarium", "camp_site", "caravan_site", "chalet", "gallery", "guest_house",
               "hostel", "hotel", "motel", "museum", "theme_park", "zoo"]
    railway: ["platform", "station", "stop", "subway_entrance", "tram_stop"]
    leisure: ["amusement_arcade", "disc_golf_course", "dog_park", "escape_game", "fitness_centre", "fitness_station",
              "miniature_golf", "playground", "sports_centre", "sports_hall", "swimming_area", "water_park"]
    sport: ["fitness", "swimming", "yoga"]
    highway: ["bus_stop"]
    public_transport: ["station", "stop_position"]
    historic: ["aircraft", "aqueduct", "archaeological_site", "battlefield", "bomb_crater", "castle", "church",
               "city_gate", "citywalls", "fort", "locomotive", "memorial", "monastery", "monument",
               "railway_car", "ruins", "ship", "tank", "tomb", "tower", "vehicle", "wreck"]

  additional_columns: ["name", "operator", "addr:street","addr:housenumber", "addr:postcode", "addr:city", "addr:country", "phone", "email", "website", 
                       "capacity", "opening_hours", "wheelchair", "origin", "organic", "subway", "brand"]
  nodes : True
  ways : True
  relations : True
  
preparation:
  supermarket:
    classify_by_name:
      supermarket: 
        children:
          rewe     : ["rewe", "rewe city"]
          tegut    : ["tegut"]
          feneberg : ["feneberg"]
          nahkauf  : ["nahkauf"]
          kupsch   : ["kupsch"]
          aez      : ["aez"]
          edeka    : ["edeka", "nah & gut", "e center", "diska", "e aktiv"]
          k+k      : ["k+k", "k&k"]
          nah&frisch : ["nah&frisch"]
          nah&gut  : ["nah&gut", "nah und gut"]
          cap-markt : ["cap-markt"]
          markant   : ["markant"]
          konsum    : ["konsum"]
          combi     : ["combi"]
          famila    : ["famila"]
          billa     : ["billa"]
        threshold: 0.7

      discount_supermarket: 
        children:
          aldi  : ["aldi"]
          lidl  : ["lidl"]
          netto : ["netto"]
          norma : ["norma"]
          penny : ["penny"]
        threshold: 0.8

      hypermarket: 
        children:
          real      : ["real"]
          v-markt   : ["v-markt"]
          kaufland  : ["kaufland"]
          hit       : ["hit"]
          globus    : ["globus"]
          marktkauf: ["marktkauf"]
        threshold: 0.9

      wholesale: 
        children:
          metro     : ["metro"]
          hamberger : ["hamberger"]
        threshold: 0.7
      
      organic_supermarket:
        children:
          denn's Biomarkt : ["denn's", "denns", "denn"]
          alnatura : ["alnatura"]
          vollcorner : ["vollcorner"]
          reformhaus : ["reformhaus"]
          naturkost : ["naturkost"]
          bio: ["bio", "bioladen"]
          vitalia : ["vitalia"]
        threshold: 0.7
      
      chemist: 
        children:
          rossmann : ["rossmann"]
          müller : ["müller", "mueller"]
          drogerie: ["drogerie"]
        threshold: 0.7
      
      variety_store: 
        children:
          tedi : ["tedi"]
        threshold: 0.7
        
      other_grocery:
        children:
          turkish : ["türkisch", "turkish", "turk"]
          asia : ["asia", "asien", "asiatische"]
          other : ["italienisch", "polnische", "spanische", "russisch"]
          mix markt : ["mix markt"]
        threshold: 0.7

    classify_by_tag:
      other_grocery:
        origin: [True]
      organic_supermarket:
        organic: ["only"]
      discount_supermarket: 
        name: ["np"]
      supermarket:
        name: ["combi"]
      chemist:
        name: ["dm"]
    unmatched: "other_grocery"
  
  convenience:
    classify_by_tag:
      other_grocery:
        shop: ["convenience"]

  deli:
    classify_by_tag:
      other_grocery:
        shop: ["deli"]
      
  greengrocer:
    classify_by_tag:
      other_grocery: 
        shop: ["greengrocer"]

  health_food: 
    classify_by_tag:
      organic_supermarket:
        shop: ["health_food"]

  chemist:
    classify_by_tag:
      chemist:
        shop: ["chemist"]
  
  convenience: 
    inherit: "supermarket"
  grocery: 
    inherit: "supermarket"
  deli: 
    inherit: "supermarket"

validation:
  new_poi_table: "public.poi_osm_de"
  old_poi_table:
    ["goat.poi_shopping"]
  metrics:
    poi_count:
      geom_reference_query: "SELECT objektidentifikator, geografischername_gen, einwohnerzahl_ewz, geom FROM public.germany_counties"
      thresholds:
        default: 0.1
        supermarket: 0.05
        bakery: 0.06
        pharmacy: 0.07
        dentist: 0.03
    # poi_density:
    #   geom_reference_query: "SELECT objektidentifikator, geografischername_gen, einwohnerzahl_ewz, geom FROM public.germany_counties"
    #   thresholds:
    #     default: 100.0
    #     supermarket: 50.0
    #     bakery: 80.0
    #     pharmacy: 60.0
    #     dentist: 30.0
    #     restaurant: 200.0
    #     hospital: 10.0
    poi_per_people:
      geom_reference_query: "SELECT objektidentifikator, geografischername_gen, einwohnerzahl_ewz, geom FROM public.germany_municipalities"
      capita_people_count: 1000
      thresholds:
        default: 0.1
        supermarket: 0.05
        bakery: 0.06
    # population_per_poi:
    #   geom_reference_query: "SELECT objektidentifikator, geografischername_gen, einwohnerzahl_ewz, geom FROM public.germany_counties"
    #   thresholds:
    #     default: 0.2
    #     restaurant: 0.1
    #     hospital: 0.05
  lcs:
    poi_columns:
    - id
    - name
    - category
    - geom
    excluded_categories: ['bus_stop', 'bus_station']
    search_radius_m: 40       # Max planar distance in meters for finding nearby POIs
    weights:
      name: 0.6          # Weight for name similarity in combined score
      category: 0.4      # Weight for category similarity in combined score
    threshold_lcs: 0.55        # Overall similarity threshold for flagging a match


subscription:
  repo_url: "https://github.com/plan4better/pois"